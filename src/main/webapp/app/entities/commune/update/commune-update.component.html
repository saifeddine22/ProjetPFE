<div class="d-flex justify-content-center">
  <div class="col-8">
    <form name="editForm" role="form" novalidate (ngSubmit)="save()" [formGroup]="editForm">
      <h2 id="jhi-commune-heading" data-cy="CommuneCreateUpdateHeading" jhiTranslate="bricoviteApp.commune.home.createOrEditLabel">
        Create or edit a Commune
      </h2>

      <div>
        <jhi-alert-error></jhi-alert-error>

        <div class="row mb-3" [hidden]="editForm.get('id')!.value == null">
          <label class="form-label" jhiTranslate="global.field.id" for="field_id">ID</label>
          <input type="number" class="form-control" name="id" id="field_id" data-cy="id" formControlName="id" [readonly]="true" />
        </div>

        <div class="row mb-3">
          <label class="form-label" jhiTranslate="bricoviteApp.commune.nom" for="field_nom">Nom</label>
          <input type="text" class="form-control" name="nom" id="field_nom" data-cy="nom" formControlName="nom" />
        </div>

        <div class="row mb-3">
          <label class="form-label" jhiTranslate="bricoviteApp.commune.nomAr" for="field_nomAr">Nom Ar</label>
          <input type="text" class="form-control" name="nomAr" id="field_nomAr" data-cy="nomAr" formControlName="nomAr" />
        </div>

        <div class="row mb-3">
          <label class="form-label" jhiTranslate="bricoviteApp.commune.geometry" for="field_geometry">Geometry</label>
          <input type="text" class="form-control" name="geometry" id="field_geometry" data-cy="geometry" formControlName="geometry" />
        </div>

        <div class="row mb-3">
          <label class="form-label" jhiTranslate="bricoviteApp.commune.attachement" for="field_attachement">Attachement</label>
          <input
            type="text"
            class="form-control"
            name="attachement"
            id="field_attachement"
            data-cy="attachement"
            formControlName="attachement"
          />
        </div>

        <div class="row mb-3">
          <label class="form-label" jhiTranslate="bricoviteApp.commune.province" for="field_province">Province</label>
          <select class="form-control" id="field_province" data-cy="province" name="province" formControlName="province">
            <option *ngIf="!editForm.get('province')!.value" [ngValue]="null" selected></option>
            <option
              [ngValue]="provinceOption.id === editForm.get('province')!.value?.id ? editForm.get('province')!.value : provinceOption"
              *ngFor="let provinceOption of provincesSharedCollection; trackBy: trackProvinceById"
            >
              {{ provinceOption.nom }}
            </option>
          </select>
        </div>
        <div *ngIf="editForm.get(['province'])!.invalid && (editForm.get(['province'])!.dirty || editForm.get(['province'])!.touched)">
          <small
            class="form-text text-danger"
            *ngIf="editForm.get(['province'])?.errors?.required"
            jhiTranslate="entity.validation.required"
          >
            This field is required.
          </small>
        </div>
      </div>

      <div>
        <button type="button" id="cancel-save" data-cy="entityCreateCancelButton" class="btn btn-secondary" (click)="previousState()">
          <fa-icon icon="ban"></fa-icon>&nbsp;<span jhiTranslate="entity.action.cancel">Cancel</span>
        </button>

        <button
          type="submit"
          id="save-entity"
          data-cy="entityCreateSaveButton"
          [disabled]="editForm.invalid || isSaving"
          class="btn btn-primary"
        >
          <fa-icon icon="save"></fa-icon>&nbsp;<span jhiTranslate="entity.action.save">Save</span>
        </button>
      </div>
    </form>
  </div>
</div>
