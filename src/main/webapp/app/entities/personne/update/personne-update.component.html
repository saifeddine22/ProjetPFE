<div class="d-flex justify-content-center">
  <div class="col-8">
    <form name="editForm" role="form" novalidate (ngSubmit)="save()" [formGroup]="editForm">
      <h2 id="jhi-personne-heading" data-cy="PersonneCreateUpdateHeading" jhiTranslate="bricoviteApp.personne.home.createOrEditLabel">
        Create or edit a Personne
      </h2>

      <div>
        <jhi-alert-error></jhi-alert-error>

        <div class="row mb-3" [hidden]="editForm.get('id')!.value == null">
          <label class="form-label" jhiTranslate="global.field.id" for="field_id">ID</label>
          <input type="number" class="form-control" name="id" id="field_id" data-cy="id" formControlName="id" [readonly]="true" />
        </div>

        <div class="row mb-3">
          <label class="form-label" jhiTranslate="bricoviteApp.personne.cnie" for="field_cnie">Cnie</label>
          <input type="text" class="form-control" name="cnie" id="field_cnie" data-cy="cnie" formControlName="cnie" />
          <div *ngIf="editForm.get('cnie')!.invalid && (editForm.get('cnie')!.dirty || editForm.get('cnie')!.touched)">
            <small class="form-text text-danger" *ngIf="editForm.get('cnie')?.errors?.required" jhiTranslate="entity.validation.required">
              This field is required.
            </small>
          </div>
        </div>

        <div class="row mb-3">
          <label class="form-label" jhiTranslate="bricoviteApp.personne.typeCompte" for="field_typeCompte">Type Compte</label>
          <input
            type="text"
            class="form-control"
            name="typeCompte"
            id="field_typeCompte"
            data-cy="typeCompte"
            formControlName="typeCompte"
          />
          <div *ngIf="editForm.get('typeCompte')!.invalid && (editForm.get('typeCompte')!.dirty || editForm.get('typeCompte')!.touched)">
            <small
              class="form-text text-danger"
              *ngIf="editForm.get('typeCompte')?.errors?.required"
              jhiTranslate="entity.validation.required"
            >
              This field is required.
            </small>
          </div>
        </div>

        <!-- <div class="row mb-3">
          <label class="form-label" jhiTranslate="bricoviteApp.personne.user" for="field_user">User</label>
          <select class="form-control" id="field_user" data-cy="user" name="user" formControlName="user">
            <option *ngIf="!editForm.get('user')!.value" [ngValue]="null" selected></option>
            <option
              [ngValue]="userOption.id === editForm.get('user')!.value?.id ? editForm.get('user')!.value : userOption"
              *ngFor="let userOption of usersSharedCollection; trackBy: trackUserById"
            >
              {{ userOption.firstName }}
            </option>
          </select>
        </div> -->
        <div *ngIf="editForm.get(['user'])!.invalid && (editForm.get(['user'])!.dirty || editForm.get(['user'])!.touched)">
          <small class="form-text text-danger" *ngIf="editForm.get(['user'])?.errors?.required" jhiTranslate="entity.validation.required">
            This field is required.
          </small>
        </div>
      </div>

      <div>
        <button type="button" id="cancel-save" data-cy="entityCreateCancelButton" class="btn btn-secondary" (click)="previousState()">
          <fa-icon icon="ban"></fa-icon>&nbsp;<span jhiTranslate="entity.action.cancel">Cancel</span>
        </button>

        <button
          type="submit"
          id="save-entity"
          data-cy="entityCreateSaveButton"
          [disabled]="editForm.invalid || isSaving"
          class="btn btn-primary"
        >
          <fa-icon icon="save"></fa-icon>&nbsp;<span jhiTranslate="entity.action.save">Save</span>
        </button>
      </div>
    </form>
  </div>
</div>
